version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: takaada
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mock_api:
    build: .
    command: uvicorn mock_accounting_api.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  api:
    build: .
    command: >
      sh -c "echo 'Waiting for postgres...' &&
             sleep 5 &&
             alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/takaada
      REDIS_URL: redis://redis:6379/0
      EXTERNAL_API_URL: http://mock_api:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mock_api:
        condition: service_started

  celery_worker:
    build: .
    command: celery -A src.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/takaada
      REDIS_URL: redis://redis:6379/0
      EXTERNAL_API_URL: http://mock_api:8001
    depends_on:
      - postgres
      - redis
      - mock_api

  celery_beat:
    build: .
    command: celery -A src.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/takaada
      REDIS_URL: redis://redis:6379/0
      EXTERNAL_API_URL: http://mock_api:8001
    depends_on:
      - redis

volumes:
  pgdata:
